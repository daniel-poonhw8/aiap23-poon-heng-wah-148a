database:
  path: "online_shopping.db"
  table: "online_shopping"

preprocessing:
  test_size: 0.2
  random_state: 42

models:
  - name: "logistic_regression"
    params:
      C: 1.0
      max_iter: 1000
  - name: "random_forest"
    params:
      n_estimators: 100
      max_depth: 10
  - name: "xgboost"
    params:
      n_estimators: 100
      max_depth: 6
      learning_rate: 0.1

feature_engineering:
  enabled: true